name: Daily Price Check

on:
  schedule:
    - cron: '0 22 * * *'  # 07:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  price-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run price check
        run: python main.py

      - name: Commit and push results
        run: |
          git config user.name "price-monitor[bot]"
          git config user.email "price-monitor@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: price update $(date +'%Y-%m-%d')"
          git push origin main
